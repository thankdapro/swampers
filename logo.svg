<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="512" height="512">
  <!-- eye stalk tops -->
  <rect x="2" y="2" width="3" height="1" fill="#3a5a2a"/>
  <rect x="11" y="2" width="3" height="1" fill="#3a5a2a"/>
  <!-- eye sockets -->
  <rect x="1" y="3" width="5" height="4" fill="#5a8a3a"/>
  <rect x="10" y="3" width="5" height="4" fill="#5a8a3a"/>
  <!-- eye whites -->
  <rect x="2" y="4" width="3" height="2" fill="#e8f0d0"/>
  <rect x="11" y="4" width="3" height="2" fill="#e8f0d0"/>
  <!-- pupils -->
  <rect x="3" y="4" width="1" height="2" fill="#0d1a0d"/>
  <rect x="12" y="4" width="1" height="2" fill="#0d1a0d"/>
  <!-- body -->
  <rect x="0" y="7" width="16" height="7" fill="#5a8a3a"/>
  <rect x="0" y="7" width="16" height="1" fill="#7a9a4a"/>
  <rect x="0" y="13" width="16" height="1" fill="#3a5a2a"/>
  <!-- mouth -->
  <rect x="5" y="10" width="6" height="1" fill="#2a3a1a"/>
  <!-- nostrils -->
  <rect x="4" y="8" width="1" height="1" fill="#3a5a2a"/>
  <rect x="11" y="8" width="1" height="1" fill="#3a5a2a"/>
</svg>
