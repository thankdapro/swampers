<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — The Swampers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a1408;
      --bg-mid: #142a18;
      --glow: #a8e060;
      --glow-bright: #c8ff70;
      --text-soft: #c8d4b0;
      --text-muted: #8aa078;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      color: var(--text-soft);
      -webkit-font-smoothing: antialiased;
      background: var(--bg-deep);
    }

    .stage {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(168, 224, 96, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 80%, rgba(120, 180, 60, 0.12) 0%, transparent 70%),
        var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 28px;
    }

    /* Floating soft orbs (firefly-like, calm) */
    .orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 224, 96, 0.3) 0%, transparent 70%);
      filter: blur(40px);
      animation: float 12s ease-in-out infinite;
    }
    .orb-1 { width: 340px; height: 340px; top: 10%; left: 8%; }
    .orb-2 { width: 280px; height: 280px; bottom: 12%; right: 10%; animation-delay: -4s; animation-duration: 16s; }
    .orb-3 { width: 220px; height: 220px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -8s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); opacity: 0.7; }
      50%      { transform: translate(30px, -20px); opacity: 1; }
    }
    .orb-3 { animation-name: float3; }
    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; }
    }

    /* Frog mark — pixel logo, bobbing */
    .frog {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      shape-rendering: crispEdges;
      animation: bob 3.4s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(168, 224, 96, 0.35));
      position: relative;
      z-index: 1;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* Status pill */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--glow);
      background: rgba(168, 224, 96, 0.08);
      border: 1px solid rgba(168, 224, 96, 0.3);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--glow-bright);
      box-shadow: 0 0 8px var(--glow-bright), 0 0 16px rgba(200, 255, 112, 0.6);
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.85); }
    }

    .title {
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(180deg, #e8f8c8 0%, var(--glow) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(168, 224, 96, 0.4));
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-size: clamp(1.05rem, 2.4vw, 1.4rem);
      font-weight: 500;
      max-width: 540px;
      color: var(--text-soft);
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }

    .dots {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--glow);
      opacity: 0.3;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.4); }
    }

    .footer-line {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }

    .footer-line em {
      font-style: italic;
      color: var(--glow);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <svg class="frog" viewBox="0 0 16 16" shape-rendering="crispEdges" aria-label="The Swampers logo">
      <rect x="2" y="2" width="3" height="1" fill="#3a5a2a"/>
      <rect x="11" y="2" width="3" height="1" fill="#3a5a2a"/>
      <rect x="1" y="3" width="5" height="4" fill="#5a8a3a"/>
      <rect x="10" y="3" width="5" height="4" fill="#5a8a3a"/>
      <rect x="2" y="4" width="3" height="2" fill="#e8f0d0"/>
      <rect x="11" y="4" width="3" height="2" fill="#e8f0d0"/>
      <rect x="3" y="4" width="1" height="2" fill="#0d1a0d"/>
      <rect x="12" y="4" width="1" height="2" fill="#0d1a0d"/>
      <rect x="0" y="7" width="16" height="7" fill="#5a8a3a"/>
      <rect x="0" y="7" width="16" height="1" fill="#7a9a4a"/>
      <rect x="0" y="13" width="16" height="1" fill="#3a5a2a"/>
      <rect x="5" y="10" width="6" height="1" fill="#2a3a1a"/>
      <rect x="4" y="8" width="1" height="1" fill="#3a5a2a"/>
      <rect x="11" y="8" width="1" height="1" fill="#3a5a2a"/>
    </svg>

    <div class="pill">
      <span class="pill-dot"></span>
      The Swampers
    </div>

    <h1 class="title">Coming Soon</h1>

    <p class="subtitle">The swamp is bubbling and the frogs are tuning up.<br />We&rsquo;re putting the finishing touches on the nation.</p>

    <div class="dots" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <p class="footer-line">See you in the swamp &mdash; <em>In Squid and Swamp and Shrek we Trust.</em></p>
  </div>
</body>
</html>
